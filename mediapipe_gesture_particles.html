<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaPipe 人體/手部偵測 + 手勢粒子系統</title>
<style>
  :root{
    --bg:#0a0e14;
    --panel:rgba(10,14,20,0.55);
    --accent:#4ad8ff;
    --text:#eef6ff;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg); color:var(--text);
    font-family:"Microsoft JhengHei","PingFang TC","Segoe UI",sans-serif;
    overflow:hidden;
  }
  #stage{
    position:relative;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #canvas{
    max-width:100%; max-height:100%;
    transform:scaleX(-1); /* 鏡像顯示，符合自拍視角 */
    background:#000;
    border-radius:4px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
  }
  video{ display:none; }

  #titleBar{
    position:absolute; top:10px; left:0; right:0;
    text-align:center; z-index:10; pointer-events:none;
  }
  #titleBar h1{
    display:inline-block;
    margin:0; padding:8px 22px;
    font-size:22px; font-weight:700; letter-spacing:2px;
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:10px;
    backdrop-filter:blur(6px);
    text-shadow:0 0 8px rgba(74,216,255,0.6);
  }

  #datetime{
    position:absolute; top:14px; right:16px; z-index:10;
    background:var(--panel); border:1px solid rgba(255,255,255,0.15);
    border-radius:10px; padding:8px 14px; font-size:14px; text-align:right;
    backdrop-filter:blur(6px); line-height:1.5; pointer-events:none;
  }
  #datetime .time{ font-size:20px; font-weight:700; color:var(--accent); }

  #legend{
    position:absolute; top:14px; left:16px; z-index:10;
    background:var(--panel); border:1px solid rgba(255,255,255,0.15);
    border-radius:10px; padding:8px 12px; font-size:12px;
    backdrop-filter:blur(6px); pointer-events:none;
    display:flex; flex-direction:column; gap:6px;
  }
  #legend .row{ display:flex; align-items:center; gap:8px; }
  #legend .swatch{
    width:16px; height:16px; border-radius:4px; opacity:0.35;
    border:1px solid rgba(255,255,255,0.3);
    display:flex; align-items:center; justify-content:center;
    transition:opacity .2s, transform .2s;
  }
  #legend .swatch.active{ opacity:1; transform:scale(1.15); box-shadow:0 0 8px currentColor; }

  #statusPanel{
    position:absolute; bottom:14px; left:16px; z-index:10;
    background:var(--panel); border:1px solid rgba(255,255,255,0.15);
    border-radius:10px; padding:10px 14px; font-size:13px;
    backdrop-filter:blur(6px); pointer-events:none; line-height:1.6;
    min-width:230px;
  }
  #statusPanel b{ color:var(--accent); }

  #instructions{
    position:absolute; bottom:14px; right:16px; z-index:10;
    background:var(--panel); border:1px solid rgba(255,255,255,0.15);
    border-radius:10px; padding:10px 14px; font-size:12px;
    backdrop-filter:blur(6px); pointer-events:none; max-width:280px; line-height:1.6;
  }

  #startOverlay{
    position:absolute; inset:0; z-index:50;
    background:rgba(4,6,10,0.92);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; text-align:center; padding:20px;
  }
  #startOverlay h2{ margin:0; font-size:20px; }
  #startOverlay p{ margin:0; opacity:0.75; font-size:13px; max-width:480px; }
  #startBtn{
    padding:12px 32px; font-size:16px; font-weight:700;
    background:var(--accent); color:#001019; border:none; border-radius:30px;
    cursor:pointer; letter-spacing:1px;
  }
  #startBtn:disabled{ opacity:0.5; cursor:wait; }
  #loadMsg{ font-size:13px; color:var(--accent); min-height:18px; }
  #errMsg{ color:#ff6b6b; font-size:13px; min-height:18px; }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="titleBar"><h1>M11409933李建興</h1></div>

  <div id="datetime">
    <div class="date" id="dateStr">--</div>
    <div class="time" id="timeStr">--:--:--</div>
  </div>

  <div id="legend"></div>

  <div id="statusPanel">
    右手：<b id="rHandState">未偵測</b><br>
    左手距離控制範圍：<b id="lHandRange">--</b><br>
    目前造型：<b id="curShapeName">--</b>
  </div>

  <div id="instructions">
    👉 右手張開＝粒子展開並跟隨手掌移動<br>
    ✊ 右手握拳（扇合）＝粒子收縮，並切換下一組顏色與形狀<br>
    🖐 左手靠近/遠離鏡頭＝控制粒子擴散範圍大小
  </div>

  <div id="startOverlay">
    <h2>手勢控制粒子系統</h2>
    <p>本頁使用 MediaPipe 進行即時人體姿勢與雙手偵測，攝影機畫面與偵測骨架會即時疊加顯示，並依右手開合、左手距離即時控制畫面上的粒子效果。請允許攝影機權限後開始。</p>
    <div id="loadMsg"></div>
    <div id="errMsg"></div>
    <button id="startBtn">開始偵測</button>
  </div>
</div>

<script type="module">
import {
  HandLandmarker, PoseLandmarker, FilesetResolver, DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");
const startOverlay = document.getElementById("startOverlay");
const loadMsg = document.getElementById("loadMsg");
const errMsg = document.getElementById("errMsg");
const rHandStateEl = document.getElementById("rHandState");
const lHandRangeEl = document.getElementById("lHandRange");
const curShapeNameEl = document.getElementById("curShapeName");
const legendEl = document.getElementById("legend");

// ---------- 日期時間 ----------
function updateClock(){
  const now = new Date();
  document.getElementById("dateStr").textContent =
    now.toLocaleDateString("zh-TW", { year:"numeric", month:"2-digit", day:"2-digit", weekday:"short" });
  document.getElementById("timeStr").textContent =
    now.toLocaleTimeString("zh-TW", { hour12:false });
}
updateClock();
setInterval(updateClock, 1000);

// 若輸入端未鏡像畫面，MediaPipe 的左右手判斷需對調，才符合自拍鏡像的直覺
const SWAP_HANDEDNESS = true;

// ---------- 造型／顏色組合 ----------
const PALETTE = [
  { name:"愛心", shape:"heart",    color:"#ff2d6f" },
  { name:"星星", shape:"star",     color:"#ffd93d" },
  { name:"圓形", shape:"circle",   color:"#2dd4ff" },
  { name:"三角形", shape:"triangle", color:"#7cff6b" },
  { name:"菱形", shape:"diamond",  color:"#b26bff" },
];
let paletteIndex = 0;

function buildLegend(){
  legendEl.innerHTML = "";
  PALETTE.forEach((p, i)=>{
    const row = document.createElement("div");
    row.className = "row";
    const sw = document.createElement("div");
    sw.className = "swatch" + (i===paletteIndex ? " active":"");
    sw.style.background = p.color;
    sw.style.color = p.color;
    sw.dataset.idx = i;
    const label = document.createElement("span");
    label.textContent = p.name;
    row.appendChild(sw); row.appendChild(label);
    legendEl.appendChild(row);
  });
  curShapeNameEl.textContent = PALETTE[paletteIndex].name;
}
buildLegend();

function nextPalette(){
  paletteIndex = (paletteIndex + 1) % PALETTE.length;
  buildLegend();
}

// ---------- 形狀繪製 ----------
function drawHeart(x,y,size,color,alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  ctx.scale(size/16, size/16);
  ctx.beginPath();
  ctx.moveTo(0,4);
  ctx.bezierCurveTo(0,-2, -10,-2, -10,6);
  ctx.bezierCurveTo(-10,14, 0,18, 0,24);
  ctx.bezierCurveTo(0,18, 10,14, 10,6);
  ctx.bezierCurveTo(10,-2, 0,-2, 0,4);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.fill();
  ctx.restore();
}
function drawStar(x,y,size,color,alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  const spikes=5, outer=size, inner=size*0.45;
  ctx.beginPath();
  for(let i=0;i<spikes*2;i++){
    const r = i%2===0 ? outer : inner;
    const a = (Math.PI/spikes)*i - Math.PI/2;
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.fill();
  ctx.restore();
}
function drawCircle(x,y,size,color,alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(x,y,size,0,Math.PI*2);
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.fill();
  ctx.restore();
}
function drawTriangle(x,y,size,color,alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  ctx.beginPath();
  ctx.moveTo(0,-size);
  ctx.lineTo(size*0.87, size*0.5);
  ctx.lineTo(-size*0.87, size*0.5);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.fill();
  ctx.restore();
}
function drawDiamond(x,y,size,color,alpha){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  ctx.beginPath();
  ctx.moveTo(0,-size);
  ctx.lineTo(size*0.7,0);
  ctx.lineTo(0,size);
  ctx.lineTo(-size*0.7,0);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 10;
  ctx.fill();
  ctx.restore();
}
const SHAPE_DRAW = {
  heart: drawHeart, star: drawStar, circle: drawCircle,
  triangle: drawTriangle, diamond: drawDiamond
};

// ---------- 粒子系統 ----------
const NUM_PARTICLES = 160;
const particles = [];
function initParticles(){
  particles.length = 0;
  for(let i=0;i<NUM_PARTICLES;i++){
    particles.push({
      angle: Math.random()*Math.PI*2,
      speed: (Math.random()-0.5)*0.02,
      radiusFrac: 0.25 + Math.random()*0.85,
      sizeBase: 5 + Math.random()*7,
      phase: Math.random()*Math.PI*2,
      lightJitter: (Math.random()-0.5)*0.3
    });
  }
}
initParticles();

let expansion = 1;        // 0=收縮 1=展開，平滑補間
let expansionTarget = 1;
let smoothedRange = 220;  // 粒子擴散半徑（由左手距離控制）
let attractorX = null, attractorY = null; // 粒子中心點（跟隨右手掌心）

function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
function lerp(a,b,t){ return a+(b-a)*t; }

function shadeColor(hex, amt){
  // 簡易明度調整
  const c = hex.replace("#","");
  const num = parseInt(c,16);
  let r=(num>>16)+Math.round(255*amt);
  let g=((num>>8)&0xff)+Math.round(255*amt);
  let b=(num&0xff)+Math.round(255*amt);
  r=clamp(r,0,255); g=clamp(g,0,255); b=clamp(b,0,255);
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function updateAndDrawParticles(dt, time, cw, ch){
  const cx = attractorX ?? cw/2;
  const cy = attractorY ?? ch/2;
  expansion = lerp(expansion, expansionTarget, 0.08);

  const combo = PALETTE[paletteIndex];
  const drawFn = SHAPE_DRAW[combo.shape];
  const margin = 14;

  for(const p of particles){
    p.angle += p.speed;
    const pulsate = Math.sin(time*0.002 + p.phase) * 6;
    const radius = expansion * p.radiusFrac * smoothedRange + pulsate * expansion;
    let x = cx + Math.cos(p.angle) * radius;
    let y = cy + Math.sin(p.angle) * radius * 0.9;

    // 即使超出設定範圍/邊界，也強制夾在畫面內，確保粒子永遠可見
    x = clamp(x, margin, cw - margin);
    y = clamp(y, margin, ch - margin);

    const size = (p.sizeBase) * (0.55 + 0.45*expansion);
    const alpha = 0.55 + 0.45*expansion;
    const color = shadeColor(combo.color, p.lightJitter*0.3);
    drawFn(x, y, size, color, alpha);
  }
}

// ---------- 手勢判斷 ----------
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

function countExtendedFingers(lm){
  const pairs = [[6,8],[10,12],[14,16],[18,20]]; // [pip, tip] for index/middle/ring/pinky
  const wrist = lm[0];
  let count = 0;
  for(const [pip,tip] of pairs){
    if(dist(wrist, lm[tip]) > dist(wrist, lm[pip]) * 1.12) count++;
  }
  return count;
}

let rightOpenState = null; // null = 尚未判定
let rightHandSeen = false;

function processRightHand(lm){
  const extended = countExtendedFingers(lm);
  let isOpen;
  if(rightOpenState === null){
    isOpen = extended >= 3;
  } else if(rightOpenState === true){
    isOpen = extended >= 2; // 遲滯，避免抖動
  } else {
    isOpen = extended >= 4;
  }

  if(rightOpenState === true && isOpen === false){
    // 由開到合的「扇合」瞬間 -> 切換顏色與形狀
    nextPalette();
  }
  rightOpenState = isOpen;
  expansionTarget = isOpen ? 1 : 0.06;
  rHandStateEl.textContent = isOpen ? "張開（展開粒子）" : "握拳（收縮＋切換造型）";
}

function processLeftHand(lm, cw, ch){
  const wrist = lm[0], midMcp = lm[9];
  const spanPx = Math.hypot((wrist.x-midMcp.x)*cw, (wrist.y-midMcp.y)*ch);
  const minSpan=28, maxSpan=170;
  const t = clamp((spanPx-minSpan)/(maxSpan-minSpan), 0, 1);
  const rangeMin = 70, rangeMax = Math.min(cw,ch)*0.42;
  const targetRange = lerp(rangeMin, rangeMax, t);
  smoothedRange = lerp(smoothedRange, targetRange, 0.15);
  lHandRangeEl.textContent = Math.round(smoothedRange) + " px ("+(t>0.66?"靠近":t>0.33?"中等":"遠離")+")";
}

// ---------- MediaPipe 初始化 ----------
let handLandmarker, poseLandmarker;

async function setupModels(){
  loadMsg.textContent = "載入模型中...";
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    numHands: 2,
    runningMode: "VIDEO"
  });
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numPoses: 1
  });
  loadMsg.textContent = "模型載入完成";
}

async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width:1280, height:720, facingMode:"user" }, audio:false
  });
  video.srcObject = stream;
  await new Promise(res => { video.onloadedmetadata = () => res(); });
  video.play();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
}

const drawingUtils = new DrawingUtils(ctx);
let lastTime = performance.now();

function renderLoop(){
  const now = performance.now();
  const dt = now - lastTime;
  lastTime = now;
  const cw = canvas.width, ch = canvas.height;

  ctx.clearRect(0,0,cw,ch);
  ctx.drawImage(video, 0, 0, cw, ch);

  const ts = performance.now();

  // ---- Pose ----
  const poseResult = poseLandmarker.detectForVideo(video, ts);
  if(poseResult.landmarks && poseResult.landmarks.length){
    for(const lm of poseResult.landmarks){
      drawingUtils.drawConnectors(lm, PoseLandmarker.POSE_CONNECTIONS,
        { color:"#4ad8ff88", lineWidth:2 });
      drawingUtils.drawLandmarks(lm,
        { color:"#ffffffcc", radius:2 });
    }
  }

  // ---- Hands ----
  const handResult = handLandmarker.detectForVideo(video, ts);
  let sawRight = false, sawLeft = false;

  if(handResult.landmarks && handResult.landmarks.length){
    handResult.landmarks.forEach((lm, i)=>{
      const rawLabel = handResult.handedness[i][0].categoryName; // "Left"/"Right"
      const userHand = SWAP_HANDEDNESS ? (rawLabel === "Left" ? "Right" : "Left")
                                        : rawLabel;
      const isRight = userHand === "Right";

      drawingUtils.drawConnectors(lm, HandLandmarker.HAND_CONNECTIONS,
        { color: isRight ? "#ff2d6f99" : "#7cff6b99", lineWidth:3 });
      drawingUtils.drawLandmarks(lm,
        { color: isRight ? "#ff2d6fdd" : "#7cff6bdd", radius:3 });

      if(isRight){
        sawRight = true;
        processRightHand(lm);
        const wrist = lm[0], midMcp = lm[9];
        const px = ((wrist.x+midMcp.x)/2) * cw;
        const py = ((wrist.y+midMcp.y)/2) * ch;
        attractorX = attractorX===null ? px : lerp(attractorX, px, 0.25);
        attractorY = attractorY===null ? py : lerp(attractorY, py, 0.25);
      } else {
        sawLeft = true;
        processLeftHand(lm, cw, ch);
      }
    });
  }

  if(!sawRight){
    rightOpenState = null;
    rHandStateEl.textContent = "未偵測";
    // 沒偵測到右手時，粒子中心緩慢回到畫面中央
    attractorX = attractorX===null ? cw/2 : lerp(attractorX, cw/2, 0.03);
    attractorY = attractorY===null ? ch/2 : lerp(attractorY, ch/2, 0.03);
  }
  if(!sawLeft){
    lHandRangeEl.textContent = Math.round(smoothedRange) + " px (維持上次數值)";
  }

  updateAndDrawParticles(dt, ts, cw, ch);

  requestAnimationFrame(renderLoop);
}

startBtn.addEventListener("click", async ()=>{
  startBtn.disabled = true;
  errMsg.textContent = "";
  try{
    await setupModels();
    loadMsg.textContent = "啟動攝影機中...";
    await setupCamera();
    startOverlay.style.display = "none";
    requestAnimationFrame(renderLoop);
  }catch(err){
    console.error(err);
    errMsg.textContent = "初始化失敗：" + err.message;
    startBtn.disabled = false;
  }
});
</script>
</body>
</html>
